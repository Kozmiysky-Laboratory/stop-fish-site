<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в аккаунт Stop Fish</title>
    <link href="fonts.googleapis.com" rel="stylesheet">
    
    <!-- Общие стили -->
    <link rel="stylesheet" href="registration_style.css">
    <!-- Стили только для страницы входа -->
    <link rel="stylesheet" href="login_style.css">
    
</head>
<body>
    <!-- Header -->
    <header>
        <div class="branding">
            <span class="site-name">Stop Fish</span>
        </div>
        <nav>
            <a href="index.html">Главная</a>
            <a href="courses/courses.html">Курсы</a>
            <a href="#about">О проекте</a>
        </nav>
    </header>

    <!-- Login Form -->
    <main>
        <section class="login-form-container">
            <form action="#" method="POST" id="loginForm">
                <h2>Вход</h2>

                <label for="email">Email адрес:</label>
                <input type="email" id="email" name="email" required placeholder="example@example.ru">

                <label for="password">Пароль:</label>
                <input type="password" id="password" name="password" required placeholder="Введите ваш пароль">

                <button type="submit" class="main-cta-button">Войти</button>

                <p class="form-message" id="formMessage" role="alert"></p>

                <p class="form-footer-text">
                    Еще нет аккаунта? <a href="registration.html">Зарегистрироваться</a>
                </p>
            </form>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <small>© Stop Fish | Ваш проводник в мире цифровой безопасности</small>
    </footer>

    <script src="js/auth.js"></script>
    <script>
        const form = document.getElementById("loginForm");
        const messageEl = document.getElementById("formMessage");
        const submitButton = form.querySelector("button[type='submit']");

        form.addEventListener("submit", async function (event) {
            event.preventDefault();
            messageEl.textContent = "";
            messageEl.classList.remove("is-error", "is-success");
            submitButton.disabled = true;

            try {
                await window.authApi.login({
                    email: form.email.value.trim(),
                    password: form.password.value,
                });
                messageEl.textContent = "Вы успешно вошли! Перенаправляем…";
                messageEl.classList.add("is-success");
                window.location.href = "index.html";
            } catch (err) {
                messageEl.textContent = err.message;
                messageEl.classList.add("is-error");
            } finally {
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
