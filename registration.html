<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация на Stop Fish</title>
    <!-- Добавлен https:// -->
    <link href="fonts.googleapis.com" rel="stylesheet">
    <!-- Подключаем новый файл стилей -->
    <link rel="stylesheet" href="registration_style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="branding">
            <span class="site-name">Stop Fish</span>
        </div>
        <nav>
            <a href="index.html">Главная</a>
            <a href="courses/courses.html">Курсы</a>
            <a href="#about">О проекте</a>
        </nav>
    </header>

    <!-- Registration Form -->
    <main>
        <section class="registration-form-container">
            <form action="#" method="POST" id="registrationForm">
                <h2>Регистрация</h2>

                <label for="fullName">Ваше имя:</label>
                <input type="text" id="fullName" name="fullName" required placeholder="" minlength="2">

                <label for="email">Email адрес:</label>
                <input type="email" id="email" name="email" required placeholder="">

                <label for="password">Пароль:</label>
                <input type="password" id="password" name="password" required placeholder="" minlength="8">

                <button type="submit" class="main-cta-button">Зарегистрироваться</button>

                <p class="form-message" id="formMessage" role="alert"></p>

                <!-- ДОБАВЛЕНО: Ссылка на страницу входа -->
                <p class="form-footer-text">
                    Уже есть аккаунт? <a href="login.html">Войти</a>
                </p>
            </form>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <small>© Stop Fish | Ваш проводник в мире цифровой безопасности</small>
    </footer>

    <script src="js/auth.js"></script>
    <script>
        const form = document.getElementById("registrationForm");
        const messageEl = document.getElementById("formMessage");
        const submitButton = form.querySelector("button[type='submit']");

        form.addEventListener("submit", async function (event) {
            event.preventDefault();
            messageEl.textContent = "";
            messageEl.classList.remove("is-error", "is-success");
            submitButton.disabled = true;

            try {
                await window.authApi.register({
                    fullName: form.fullName.value.trim(),
                    email: form.email.value.trim(),
                    password: form.password.value,
                });
                messageEl.textContent = "Регистрация прошла успешно! Перенаправляем…";
                messageEl.classList.add("is-success");
                window.location.href = "index.html";
            } catch (err) {
                const fieldError = err.fields && Object.values(err.fields)[0];
                messageEl.textContent = fieldError || err.message;
                messageEl.classList.add("is-error");
            } finally {
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
